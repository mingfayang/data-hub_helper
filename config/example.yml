mysql:
  host: "mysql-uat.example.com"
  port: 3306
  database: "hive"
  username: "hive_reader"
  password_env: "HMS_MYSQL_PASSWORD"
  connect_timeout_seconds: 30
  read_timeout_seconds: 3600
  consistent_snapshot: true

snapshot:
  output_dir: "data"
  rows_per_file: 200000
  fetch_size: 5000
  # 表清单由程序内置为 DataHub Hive Metastore connector 所需系统表。

hdfs:
  enabled: true
  bin: "hdfs"
  snapshot_dir: "hdfs:///tmp/hms-snapshots"
  output_dir: "hdfs:///tmp/datahub-mcp"
  overwrite: false

spark:
  submit: "spark-submit"
  job_file: "jobs/transform_hms.py"
  master: "yarn"
  deploy_mode: "cluster"
  queue: "default"
  driver_memory: "2g"
  driver_cores: 1
  executor_memory: "4g"
  executor_cores: 2
  num_executors: 4
  app_name: "hms-snapshot-to-datahub"
  package_current_venv: false
  archives: "hdfs:///deps/venv.tar.gz#envir"
  # venv_path: "/opt/app/env"
  venv_hdfs_dir: "hdfs:///deps"
  venv_archive_name: "venv.tar.gz"
  venv_archive_alias: "envir"
  overwrite_output: false
  env: "UAT"
  platform: "hive"
  platform_instance: "hive"
  database_pattern: ".*"
  source_timezone: "UTC"
  single_file: false
  max_file_size: "20M"
  conf:
    - "spark.sql.shuffle.partitions=200"
    # 如果 package_current_venv=true，并且 Spark job 需要使用该 Python 环境：
    # - "spark.pyspark.python=./envir/bin/python"
